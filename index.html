<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Web Page</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.container {
    margin-top: 120px;
}

h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

p {
    font-size: 22px;
    margin-bottom: 30px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff9800;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e68900;
    transform: scale(1.1);
}

.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    font-size: 14px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="container">
    <h1>🚀 Welcome to My Website</h1>
    <p>Learning Cloud + GitHub + AWS is fun!</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<div class="footer">
    Made with ❤️ by You
</div>

<script>
function showMessage() {
    alert("🎉 You successfully deployed a website on AWS!");
}
</script>

</body>
</html>
