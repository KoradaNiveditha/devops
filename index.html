<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Web Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    text-align: center;
}

.header {
    background: #2a5298;
    color: white;
    padding: 20px;
    font-size: 28px;
}

.container {
    margin-top: 80px;
}

h1 {
    color: #333;
}

p {
    font-size: 18px;
    color: #555;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

.footer {
    margin-top: 100px;
    background: #ddd;
    padding: 10px;
}
</style>

</head>

<body>

<div class="header">
    🌐 My First AWS Website
</div>

<div class="container">
    <h1>Hello 👋</h1>
    <p>This website is hosted on AWS EC2.</p>
    <p>I successfully connected GitHub and deployed it!</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<div class="footer">
    © 2026 | Created by You
</div>

<script>
function showMessage() {
    alert("🎉 Website is working perfectly!");
}
</script>

</body>
</html>

</body>
</html>
